name: Test Suite
on:
  # Triggers for every commit pushed to any branch
  push:
    branches: ["main", "develop"] 
  # Triggers when a PR is opened or updated targeting these branches
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: npm test # Replace with your test command
